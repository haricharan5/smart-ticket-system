version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourStrong!Passw0rd
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: YourStrong!Passw0rd
    command: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C
      -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name='ticketdb')
      CREATE DATABASE ticketdb\""
    restart: on-failure

  # ── Local LLM (Ollama) ───────────────────────────────────────────────────────
  # Pulls and serves Phi-3 Mini locally so the backend works without any cloud
  # API keys.  First run downloads ~2.3 GB — subsequent starts are instant.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull the model on first start, then keep serving
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull phi3:mini &&
             wait"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      AZURE_SQL_SERVER: db
      AZURE_SQL_DATABASE: ticketdb
      AZURE_SQL_USERNAME: sa
      AZURE_SQL_PASSWORD: YourStrong!Passw0rd
      SQL_TRUST_CERT: "yes"
      SQL_ENCRYPT: "yes"
      FRONTEND_URL: "http://localhost:80"
      # Azure Language Service — copy from backend/.env
      AZURE_LANGUAGE_ENDPOINT: ${AZURE_LANGUAGE_ENDPOINT}
      AZURE_LANGUAGE_KEY: ${AZURE_LANGUAGE_KEY}
      # Local LLM via Ollama container
      LLM_BASE_URL: "http://ollama:11434/v1"
      LLM_MODEL: "phi3:mini"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_POWERBI_URL: ${VITE_POWERBI_URL:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sql_data:
  ollama_models:
